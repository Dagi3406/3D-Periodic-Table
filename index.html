<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon 3D Periodic Table | Futuristic Experience</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Rajdhani', 'Arial', sans-serif;
            background-color: #050b10;
            color: #ccfff0;
        }

        /* Controls panel - futuristic glassmorphism */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 18px;
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 200, 0.35);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
            font-family: inherit;
        }

        button {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #0ff7b0;
            color: #aaffee;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 255, 200, 0.3);
        }

        button:hover {
            background: #0ff7b0;
            color: #0a1a1f;
            border-color: #ffffff;
            box-shadow: 0 0 18px #0ff7b0;
            transform: scale(1.02);
        }

        /* small info tip */
        .info-tip {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #6effc0;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-family: monospace;
            border-left: 3px solid #0ff7b0;
        }

        /* Card styling for CSS3D objects */
        .element-card {
            width: 95px;
            height: 105px;
            background: rgba(8, 18, 26, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            border: 1.5px solid rgba(0, 255, 200, 0.7);
            box-shadow: 0 0 12px rgba(0, 255, 180, 0.5), inset 0 0 6px rgba(0,255,200,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
            cursor: pointer;
            color: #d0f7ff;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .element-card:hover {
            transform: scale(1.05);
            filter: brightness(1.25);
            border-color: #8effe0;
            box-shadow: 0 0 24px #00ffcc, 0 0 6px #00ffaa;
            background: rgba(12, 30, 42, 0.95);
        }

        .atomic-number {
            font-size: 12px;
            font-weight: bold;
            color: #7effd0;
            margin-top: 8px;
            text-shadow: 0 0 3px #00ccaa;
        }

        .symbol {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #bbffea, #2affb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 6px #00ffc3;
            margin: 2px 0;
        }

        .element-name {
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            background: rgba(0,255,200,0.15);
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
            letter-spacing: 0.6px;
            color: #bbffec;
        }

        /* responsive tweaks */
        @media (max-width: 700px) {
            .controls { gap: 8px; padding: 8px 16px; }
            button { padding: 4px 12px; font-size: 0.8rem; }
            .element-card { width: 80px; height: 92px; }
            .symbol { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="controls">
        <button id="btn-table">📊 TABLE</button>
        <button id="btn-sphere">🌍 SPHERE</button>
        <button id="btn-helix">🌀 HELIX</button>
        <button id="btn-grid">🧊 GRID</button>
    </div>
    <div class="info-tip">
        ⚡ DRAG to rotate | RIGHT-CLICK to pan | SCROLL to zoom | HOVER for neon glow
    </div>

    <!-- Import Three.js core, addons, TWEEN and TrackballControls via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        import * as TWEEN from 'https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js';

        // ----------------------------------------------
        // 1. BUILD ELEMENTS DATASET (classic up to 86, excluding Lanthanides/Actinides for clean table)
        // Includes Z=1..56 and Z=72..86 => 71 elements
        // Each element has: atomicNumber, symbol, name, group (1-18), period (1-6)
        // ----------------------------------------------
        const elementData = [];

        // Helper to add element
        function addElem(z, symbol, name, group, period) {
            elementData.push({ atomicNumber: z, symbol, name, group, period });
        }

        // Period 1
        addElem(1, "H", "Hydrogen", 1, 1);
        addElem(2, "He", "Helium", 18, 1);
        // Period 2
        addElem(3, "Li", "Lithium", 1, 2);
        addElem(4, "Be", "Beryllium", 2, 2);
        addElem(5, "B", "Boron", 13, 2);
        addElem(6, "C", "Carbon", 14, 2);
        addElem(7, "N", "Nitrogen", 15, 2);
        addElem(8, "O", "Oxygen", 16, 2);
        addElem(9, "F", "Fluorine", 17, 2);
        addElem(10, "Ne", "Neon", 18, 2);
        // Period 3
        addElem(11, "Na", "Sodium", 1, 3);
        addElem(12, "Mg", "Magnesium", 2, 3);
        addElem(13, "Al", "Aluminium", 13, 3);
        addElem(14, "Si", "Silicon", 14, 3);
        addElem(15, "P", "Phosphorus", 15, 3);
        addElem(16, "S", "Sulfur", 16, 3);
        addElem(17, "Cl", "Chlorine", 17, 3);
        addElem(18, "Ar", "Argon", 18, 3);
        // Period 4
        addElem(19, "K", "Potassium", 1, 4);
        addElem(20, "Ca", "Calcium", 2, 4);
        addElem(21, "Sc", "Scandium", 3, 4);
        addElem(22, "Ti", "Titanium", 4, 4);
        addElem(23, "V", "Vanadium", 5, 4);
        addElem(24, "Cr", "Chromium", 6, 4);
        addElem(25, "Mn", "Manganese", 7, 4);
        addElem(26, "Fe", "Iron", 8, 4);
        addElem(27, "Co", "Cobalt", 9, 4);
        addElem(28, "Ni", "Nickel", 10, 4);
        addElem(29, "Cu", "Copper", 11, 4);
        addElem(30, "Zn", "Zinc", 12, 4);
        addElem(31, "Ga", "Gallium", 13, 4);
        addElem(32, "Ge", "Germanium", 14, 4);
        addElem(33, "As", "Arsenic", 15, 4);
        addElem(34, "Se", "Selenium", 16, 4);
        addElem(35, "Br", "Bromine", 17, 4);
        addElem(36, "Kr", "Krypton", 18, 4);
        // Period 5
        addElem(37, "Rb", "Rubidium", 1, 5);
        addElem(38, "Sr", "Strontium", 2, 5);
        addElem(39, "Y", "Yttrium", 3, 5);
        addElem(40, "Zr", "Zirconium", 4, 5);
        addElem(41, "Nb", "Niobium", 5, 5);
        addElem(42, "Mo", "Molybdenum", 6, 5);
        addElem(43, "Tc", "Technetium", 7, 5);
        addElem(44, "Ru", "Ruthenium", 8, 5);
        addElem(45, "Rh", "Rhodium", 9, 5);
        addElem(46, "Pd", "Palladium", 10, 5);
        addElem(47, "Ag", "Silver", 11, 5);
        addElem(48, "Cd", "Cadmium", 12, 5);
        addElem(49, "In", "Indium", 13, 5);
        addElem(50, "Sn", "Tin", 14, 5);
        addElem(51, "Sb", "Antimony", 15, 5);
        addElem(52, "Te", "Tellurium", 16, 5);
        addElem(53, "I", "Iodine", 17, 5);
        addElem(54, "Xe", "Xenon", 18, 5);
        // Period 6 (first two Cs, Ba)
        addElem(55, "Cs", "Cesium", 1, 6);
        addElem(56, "Ba", "Barium", 2, 6);
        // skip 57-71 (Lanthanides) -> but continue from 72 to 86 (Period 6 transition & post)
        addElem(72, "Hf", "Hafnium", 4, 6);
        addElem(73, "Ta", "Tantalum", 5, 6);
        addElem(74, "W", "Tungsten", 6, 6);
        addElem(75, "Re", "Rhenium", 7, 6);
        addElem(76, "Os", "Osmium", 8, 6);
        addElem(77, "Ir", "Iridium", 9, 6);
        addElem(78, "Pt", "Platinum", 10, 6);
        addElem(79, "Au", "Gold", 11, 6);
        addElem(80, "Hg", "Mercury", 12, 6);
        addElem(81, "Tl", "Thallium", 13, 6);
        addElem(82, "Pb", "Lead", 14, 6);
        addElem(83, "Bi", "Bismuth", 15, 6);
        addElem(84, "Po", "Polonium", 16, 6);
        addElem(85, "At", "Astatine", 17, 6);
        addElem(86, "Rn", "Radon", 18, 6);

        const totalElements = elementData.length; // 71 elements

        // ----------------------------------------------
        // 2. Setup Scene, Camera, CSS2DRenderer, Controls
        // ----------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b10);
        
        // Camera: perspective, good for 3D exploration
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 12, 28);
        camera.lookAt(0, 0, 0);
        
        const renderer = new CSS2DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0px';
        renderer.domElement.style.left = '0px';
        renderer.domElement.style.pointerEvents = 'auto'; // allow clicking through?
        document.body.appendChild(renderer.domElement);
        
        // TrackballControls style with OrbitControls (flexible: rotate/pan/zoom)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // ----------------------------------------------
        // 3. Create CSS2D Objects (Cards)
        // ----------------------------------------------
        const cssObjects = [];
        const cardsGroup = []; // store references to the object and its original index
        
        elementData.forEach((el, idx) => {
            // Create card container div
            const cardDiv = document.createElement('div');
            cardDiv.className = 'element-card';
            
            // inner HTML structure
            cardDiv.innerHTML = `
                <div class="atomic-number">${el.atomicNumber}</div>
                <div class="symbol">${el.symbol}</div>
                <div class="element-name">${el.name}</div>
            `;
            
            const css2D = new CSS2DObject(cardDiv);
            // store element metadata for dynamic positioning
            css2D.userData = { 
                atomicNumber: el.atomicNumber,
                group: el.group,
                period: el.period,
                index: idx
            };
            scene.add(css2D);
            cssObjects.push(css2D);
        });
        
        // ----------------------------------------------
        // 4. Layout Generation Functions (return array of Vector3 positions)
        // ----------------------------------------------
        
        // --- TABLE LAYOUT (classic periodic table based on group/period)
        function getTablePositions() {
            const positions = [];
            const spacingX = 1.28;
            const spacingY = 1.28;
            const startX = -11.5;  // center table horizontally
            const startY = 5.2;
            
            cssObjects.forEach(obj => {
                const group = obj.userData.group;
                const period = obj.userData.period;
                // Compute grid position: group 1-18, period 1-6
                let x = (group - 1) * spacingX + startX;
                let y = startY - (period - 1) * spacingY;
                // special: Helium (group 18 period 1) stays at right side, fine.
                // No special shifting needed for our dataset, all groups match.
                // For elements 72-86 they are period 6 group 4..18, correct.
                positions.push(new THREE.Vector3(x, y, 0));
            });
            return positions;
        }
        
        // --- SPHERE LAYOUT: points evenly on a sphere using fibonacci sphere algorithm for uniform distribution
        function getSpherePositions(radius = 8.2) {
            const positions = [];
            const count = cssObjects.length;
            const phiGolden = Math.PI * (3 - Math.sqrt(5));  // golden angle
            
            for (let i = 0; i < count; i++) {
                const y = 1 - (i / (count - 1)) * 2;  // y goes from 1 to -1
                const radiusAtY = Math.sqrt(1 - y*y);
                const theta = i * phiGolden * 2;
                
                const x = Math.cos(theta) * radiusAtY;
                const z = Math.sin(theta) * radiusAtY;
                // final position
                const pos = new THREE.Vector3(x * radius, y * radius, z * radius);
                positions.push(pos);
            }
            return positions;
        }
        
        // --- HELIX LAYOUT: vertical spiral (cylindrical helix)
        function getHelixPositions(radius = 5.5, heightTotal = 15, turns = 2.5) {
            const positions = [];
            const count = cssObjects.length;
            for (let i = 0; i < count; i++) {
                const t = i / (count - 1); // 0..1
                const angle = t * Math.PI * 2 * turns;
                const y = (t - 0.5) * heightTotal;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                positions.push(new THREE.Vector3(x, y, z));
            }
            return positions;
        }
        
        // --- GRID LAYOUT: multi-layered 3D cube (cubic grid)
        function getGridPositions() {
            const count = cssObjects.length;
            // Determine grid dimensions: approx cube root
            const side = Math.ceil(Math.pow(count, 1/3));
            const spacing = 1.9;
            const offset = (side - 1) * spacing / 2;
            const positions = [];
            let idx = 0;
            for (let i = 0; i < side && idx < count; i++) {
                for (let j = 0; j < side && idx < count; j++) {
                    for (let k = 0; k < side && idx < count; k++) {
                        const x = (i - (side-1)/2) * spacing;
                        const y = (j - (side-1)/2) * spacing;
                        const z = (k - (side-1)/2) * spacing;
                        positions.push(new THREE.Vector3(x, y, z));
                        idx++;
                    }
                }
            }
            // if some elements remain due to rounding, fill at end (should not happen, side^3 >= count)
            while(positions.length < count) {
                positions.push(new THREE.Vector3(0, 0, 0));
            }
            return positions;
        }
        
        // ----------------------------------------------
        // 5. Animation using TWEEN.js
        // ----------------------------------------------
        let activeTweens = [];
        
        function animateToLayout(targetPositions, duration = 1100) {
            // kill any ongoing tweens to avoid conflicts
            activeTweens.forEach(tween => tween.stop());
            activeTweens = [];
            
            cssObjects.forEach((obj, i) => {
                const startPos = obj.position.clone();
                const endPos = targetPositions[i];
                if (!endPos) return;
                
                // create tween for position properties
                const tweenObj = { x: startPos.x, y: startPos.y, z: startPos.z };
                const tween = new TWEEN.Tween(tweenObj)
                    .to({ x: endPos.x, y: endPos.y, z: endPos.z }, duration)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onUpdate(() => {
                        obj.position.set(tweenObj.x, tweenObj.y, tweenObj.z);
                    })
                    .start();
                activeTweens.push(tween);
            });
            
            // start animation loop if needed
            TWEEN.update();
        }
        
        // ----------------------------------------------
        // 6. Setup button interactions & initial layout (Table default)
        // ----------------------------------------------
        let currentLayout = 'table';
        
        function setLayout(layoutType) {
            if (currentLayout === layoutType) return;
            currentLayout = layoutType;
            let positions = [];
            switch(layoutType) {
                case 'table':
                    positions = getTablePositions();
                    break;
                case 'sphere':
                    positions = getSpherePositions(8.4);
                    break;
                case 'helix':
                    positions = getHelixPositions(6.2, 14, 2.6);
                    break;
                case 'grid':
                    positions = getGridPositions();
                    break;
                default:
                    positions = getTablePositions();
            }
            animateToLayout(positions, 1050);
        }
        
        // Attach event listeners
        document.getElementById('btn-table').addEventListener('click', () => setLayout('table'));
        document.getElementById('btn-sphere').addEventListener('click', () => setLayout('sphere'));
        document.getElementById('btn-helix').addEventListener('click', () => setLayout('helix'));
        document.getElementById('btn-grid').addEventListener('click', () => setLayout('grid'));
        
        // initial table layout
        const initialPositions = getTablePositions();
        cssObjects.forEach((obj, i) => {
            obj.position.copy(initialPositions[i]);
        });
        
        // ----------------------------------------------
        // 7. Add subtle starfield background effect (Three.js particles)
        //    to enhance futuristic vibe, behind CSS2D
        // ----------------------------------------------
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 1600;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 400;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 150 - 70;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0x66ffcc, size: 0.25, transparent: true, opacity: 0.6 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Add a faint glowing grid on floor to complement
        const gridHelper = new THREE.GridHelper(45, 28, 0x00ccaa, 0x226655);
        gridHelper.position.y = -6.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.2;
        scene.add(gridHelper);
        
        // subtle ambient light not necessary for CSS but adds depth for star particles, but fine.
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        
        // add a central glowing wireframe sphere for style? Not needed, but cool
        const glowSphereGeo = new THREE.SphereGeometry(3.2, 32, 16);
        const wireMat = new THREE.MeshBasicMaterial({ color: 0x0ff7b0, wireframe: true, transparent: true, opacity: 0.09 });
        const decorSphere = new THREE.Mesh(glowSphereGeo, wireMat);
        scene.add(decorSphere);
        
        // rotate decor sphere slowly
        function animateDecor() {
            decorSphere.rotation.x += 0.002;
            decorSphere.rotation.y += 0.003;
            requestAnimationFrame(animateDecor);
        }
        animateDecor();
        
        // ----------------------------------------------
        // 8. Render Loop & TWEEN updates
        // ----------------------------------------------
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();      // update ongoing transitions
            controls.update();   // update orbit controls
            renderer.render(scene, camera);
            
            // subtle star rotation for ambiance
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
        }
        
        animate();
        
        // handle window resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // small console log
        console.log(`✨ 3D Periodic Table ready — ${totalElements} elements loaded | Neon Theme Active`);
        
        // Optional: add little pulse effect on layout change, but fine
    </script>
</body>
</html>
