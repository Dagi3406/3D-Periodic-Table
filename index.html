<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Neon 3D Periodic Table | Futuristic Experience</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Orbitron', 'Rajdhani', 'Arial', sans-serif;
            background-color: #050b10;
            color: #ccfff0;
        }

        /* Controls panel - futuristic glassmorphism */
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 18px;
            background: rgba(10, 20, 30, 0.65);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 200, 0.35);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
            font-family: inherit;
        }

        button {
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #0ff7b0;
            color: #aaffee;
            font-size: 1rem;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0, 255, 200, 0.3);
        }

        button:hover {
            background: #0ff7b0;
            color: #0a1a1f;
            border-color: #ffffff;
            box-shadow: 0 0 18px #0ff7b0;
            transform: scale(1.02);
        }

        /* info tip */
        .info-tip {
            position: fixed;
            bottom: 15px;
            left: 15px;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #6effc0;
            backdrop-filter: blur(5px);
            pointer-events: none;
            font-family: monospace;
            border-left: 3px solid #0ff7b0;
        }

        /* Copyright notice - bottom right */
        .copyright {
            position: fixed;
            bottom: 15px;
            right: 15px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(5px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            color: #aaffdd;
            font-family: 'Orbitron', monospace;
            letter-spacing: 0.5px;
            border-right: 2px solid #0ff7b0;
            border-bottom: 1px solid rgba(0,255,200,0.4);
            pointer-events: none;
            text-shadow: 0 0 2px rgba(0,255,200,0.5);
        }

        /* Card styling for CSS3D objects */
        .element-card {
            width: 95px;
            height: 105px;
            background: rgba(8, 18, 26, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 16px;
            border: 1.5px solid rgba(0, 255, 200, 0.7);
            box-shadow: 0 0 12px rgba(0, 255, 180, 0.5), inset 0 0 6px rgba(0,255,200,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            transition: all 0.2s cubic-bezier(0.2,0.9,0.4,1.1);
            cursor: pointer;
            color: #d0f7ff;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .element-card:hover {
            transform: scale(1.05);
            filter: brightness(1.25);
            border-color: #8effe0;
            box-shadow: 0 0 24px #00ffcc, 0 0 6px #00ffaa;
            background: rgba(12, 30, 42, 0.95);
        }

        .atomic-number {
            font-size: 12px;
            font-weight: bold;
            color: #7effd0;
            margin-top: 8px;
            text-shadow: 0 0 3px #00ccaa;
        }

        .symbol {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #bbffea, #2affb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 6px #00ffc3;
            margin: 2px 0;
        }

        .element-name {
            font-size: 9px;
            font-weight: 500;
            text-transform: uppercase;
            background: rgba(0,255,200,0.15);
            padding: 2px 6px;
            border-radius: 20px;
            margin-top: 4px;
            letter-spacing: 0.6px;
            color: #bbffec;
        }

        /* Modal Styles - Futuristic Neon */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
 backdrop-filter: blur(8px);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: rgba(8, 18, 28, 0.95);
            backdrop-filter: blur(12px);
            width: 320px;
            max-width: 85vw;
            border-radius: 28px;
            border: 1px solid #0ff7b0;
            box-shadow: 0 0 35px rgba(0, 255, 200, 0.4), inset 0 0 15px rgba(0,255,200,0.1);
            padding: 20px 24px 24px;
            font-family: 'Orbitron', 'Segoe UI', monospace;
            transform: scale(0.95);
            transition: transform 0.2s ease;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 26px;
            cursor: pointer;
            color: #7effd0;
            transition: 0.2s;
            background: none;
            border: none;
            font-weight: bold;
            text-shadow: 0 0 3px #00ffcc;
        }

        .modal-close:hover {
            color: #ffffff;
            text-shadow: 0 0 8px #0ff7b0;
            transform: scale(1.1);
        }

        .modal-symbol {
            font-size: 52px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #ffffff, #2affb6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 5px 0 0px;
            letter-spacing: 4px;
        }

        .modal-name {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #bbffec;
            border-bottom: 1px solid rgba(0,255,200,0.5);
            display: inline-block;
            width: auto;
            margin: 0 auto 12px;
            padding-bottom: 5px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            border-bottom: 1px dashed rgba(0,255,200,0.3);
            padding-bottom: 6px;
            font-size: 14px;
        }

        .detail-label {
            font-weight: 600;
            color: #7effd0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .detail-value {
            font-family: monospace;
            color: #e0fffa;
            font-weight: 500;
        }

        .modal-footer {
            margin-top: 16px;
            text-align: center;
            font-size: 10px;
            color: #4effb0;
            opacity: 0.7;
        }

        @media (max-width: 700px) {
            .controls { gap: 8px; padding: 8px 16px; }
            button { padding: 4px 12px; font-size: 0.8rem; }
            .element-card { width: 80px; height: 92px; }
            .symbol { font-size: 22px; }
            .copyright { font-size: 8px; bottom: 8px; right: 8px; }
            .info-tip { font-size: 9px; }
            .modal-content { padding: 16px; width: 280px; }
            .modal-symbol { font-size: 42px; }
            .modal-name { font-size: 18px; }
        }
    </style>
</head>

        // ----------------------------------------------

        // Fallback function for any missing extra (just in case)
        function getExtraForZ(z) {
            if (extraInfo[z]) return extraInfo[z];
            return { mass: (z * 2).toFixed(1) + " u", category: "Synthetic", config: "[core] ns² np?", discovered: "Unknown" };
        }
        
        const elementData = [];
        function addElem(z, symbol, name, group, period) {
            const extras = getExtraForZ(z);
            elementData.push({ atomicNumber: z, symbol, name, group, period, mass: extras.mass, category: extras.category, config: extras.config, discovered: extras.discovered });
        }
        
        // Same dataset as before with extended info

        const totalElements = elementData.length;
        
        // ----------------------------------------------
        // 2. Setup Scene, Camera, Renderer, Controls
        // ----------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b10);
        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 12, 28);
        const renderer = new CSS2DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = '0px';
        renderer.domElement.style.left = '0px';
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.2;
        controls.panSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);
        
        // ----------------------------------------------
        // 3. Create CSS2D Objects + Click Handlers
        // ----------------------------------------------
        const cssObjects = [];
        
        elementData.forEach((el, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'element-card';
            cardDiv.innerHTML = `
                <div class="atomic-number">${el.atomicNumber}</div>
                <div class="symbol">${el.symbol}</div>
                <div class="element-name">${el.name}</div>
            `;
            const css2D = new CSS2DObject(cardDiv);
            css2D.userData = { ...el, index: idx };
            // Add click event to show modal
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                showElementDetails(el);
            });
            scene.add(css2D);
            cssObjects.push(css2D);
        });
        
        // Modal control functions
        const modalOverlay = document.getElementById('elementModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        
        function showElementDetails(el) {
            document.getElementById('modalSymbol').innerText = el.symbol;
            document.getElementById('modalName').innerText = el.name;
            document.getElementById('modalNumber').innerText = el.atomicNumber;
            document.getElementById('modalMass').innerText = el.mass;
            document.getElementById('modalCategory').innerText = el.category;
            document.getElementById('modalConfig').innerText = el.config;
            document.getElementById('modalGroupPeriod').innerText = `${el.group} / ${el.period}`;
            document.getElementById('modalDiscovered').innerText = el.discovered;
            modalOverlay.classList.add('active');
        }
        
        function closeModal() {
            modalOverlay.classList.remove('active');
        }
        
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
        });
        
        // ----------------------------------------------
        // 4. Layout Functions (same as before)
        // ----------------------------------------------
        function getTablePositions() {
            const positions = [];
            const spacingX = 1.28, spacingY = 1.28, startX = -11.5, startY = 5.2;
            cssObjects.forEach(obj => {
                const group = obj.userData.group, period = obj.userData.period;
                let x = (group - 1) * spacingX + startX;
                let y = startY - (period - 1) * spacingY;
                positions.push(new THREE.Vector3(x, y, 0));
            });
            return positions;
        }
        function getSpherePositions(radius = 8.2) {
            const positions = [], count = cssObjects.length;
            const phiGolden = Math.PI * (3 - Math.sqrt(5));
            for (let i = 0; i < count; i++) {
                const y = 1 - (i / (count - 1)) * 2;
                const radiusAtY = Math.sqrt(1 - y*y);
                const theta = i * phiGolden * 2;
                const x = Math.cos(theta) * radiusAtY;
                const z = Math.sin(theta) * radiusAtY;
                positions.push(new THREE.Vector3(x * radius, y * radius, z * radius));
            }
            return positions;
        }
        function getHelixPositions(radius = 5.5, heightTotal = 15, turns = 2.5) {
            const positions = [], count = cssObjects.length;
            for (let i = 0; i < count; i++) {
                const t = i / (count - 1);
                const angle = t * Math.PI * 2 * turns;
                const y = (t - 0.5) * heightTotal;
                positions.push(new THREE.Vector3(Math.cos(angle) * radius, y, Math.sin(angle) * radius));
            }
            return positions;
        }
        function getGridPositions() {
            const count = cssObjects.length;
            const side = Math.ceil(Math.pow(count, 1/3));
            const spacing = 1.9;
            const positions = [];
            let idx = 0;
            for (let i = 0; i < side && idx < count; i++)
                for (let j = 0; j < side && idx < count; j++)
                    for (let k = 0; k < side && idx < count; k++)
                        positions.push(new THREE.Vector3((i - (side-1)/2) * spacing, (j - (side-1)/2) * spacing, (k - (side-1)/2) * spacing));
            while(positions.length < count) positions.push(new THREE.Vector3(0,0,0));
            return positions;
        }
        
        let activeTweens = [];
        function animateToLayout(targetPositions, duration = 1100) {
            activeTweens.forEach(t => t.stop());
            activeTweens = [];
            cssObjects.forEach((obj, i) => {
                const startPos = obj.position.clone();
                const endPos = targetPositions[i];
                if (!endPos) return;
                const tweenObj = { x: startPos.x, y: startPos.y, z: startPos.z };
                const tween = new TWEEN.Tween(tweenObj).to({ x: endPos.x, y: endPos.y, z: endPos.z }, duration).easing(TWEEN.Easing.Quadratic.InOut).onUpdate(() => obj.position.set(tweenObj.x, tweenObj.y, tweenObj.z)).start();
                activeTweens.push(tween);
            });
            TWEEN.update();
        }
        
        let currentLayout = 'table';
        function setLayout(layoutType) {
            if (currentLayout === layoutType) return;
            currentLayout = layoutType;
            let positions = [];
            if (layoutType === 'table') positions = getTablePositions();
            else if (layoutType === 'sphere') positions = getSpherePositions(8.4);
            else if (layoutType === 'helix') positions = getHelixPositions(6.2, 14, 2.6);
            else if (layoutType === 'grid') positions = getGridPositions();
            else positions = getTablePositions();
            animateToLayout(positions, 1050);
        }
        
        document.getElementById('btn-table').addEventListener('click', () => setLayout('table'));
        document.getElementById('btn-sphere').addEventListener('click', () => setLayout('sphere'));
        document.getElementById('btn-helix').addEventListener('click', () => setLayout('helix'));
        document.getElementById('btn-grid').addEventListener('click', () => setLayout('grid'));
        
        const initialPositions = getTablePositions();
        cssObjects.forEach((obj, i) => obj.position.copy(initialPositions[i]));
        
        // starfield and decor
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(1600 * 3);
        for (let i = 0; i < 1600; i++) { starPositions[i*3] = (Math.random() - 0.5)*400; starPositions[i*3+1] = (Math.random() - 0.5)*200; starPositions[i*3+2] = (Math.random() - 0.5)*150 - 70; }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const stars = new THREE.Points(starGeometry, new THREE.PointsMaterial({ color: 0x66ffcc, size: 0.25, transparent: true, opacity: 0.6 }));
        scene.add(stars);
        const gridHelper = new THREE.GridHelper(45, 28, 0x00ccaa, 0x226655); gridHelper.position.y = -6.5; gridHelper.material.transparent = true; gridHelper.material.opacity = 0.2; scene.add(gridHelper);
        const ambientLight = new THREE.AmbientLight(0x111122); scene.add(ambientLight);
        const glowSphereGeo = new THREE.SphereGeometry(3.2, 32, 16);
        const decorSphere = new THREE.Mesh(glowSphereGeo, new THREE.MeshBasicMaterial({ color: 0x0ff7b0, wireframe: true, transparent: true, opacity: 0.09 }));
        scene.add(decorSphere);
        
        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            renderer.render(scene, camera);
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0003;
            decorSphere.rotation.x += 0.002;
            decorSphere.rotation.y += 0.003;
        }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        console.log(`✨ 3D Periodic Table with detailed popups — ${totalElements} elements | © 2026 Dagim Gebeyehu`);
    </script>
</body>
</html>
